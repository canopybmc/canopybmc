pre-stage:
  - cmd: dutctl
    name: Power off DUT
    parameters:
      agent: "[[attributes.Agent]]"
      device: "[[attributes.Device]]"
      command: power
      args: ["off"]

  - cmd: dutctl
    name: Emulate Flash
    parameters:
      agent: "[[attributes.Agent]]"
      device: "[[attributes.Device]]"
      command: emulate-bmc
      args: ["[[input.firmware]]"]

  - cmd: dutctl
    name: Power on DUT
    parameters:
      agent: "[[attributes.Agent]]"
      device: "[[attributes.Device]]"
      command: power
      args: ["on"]

  - cmd: dutctl
    name: Wait for boot banner on serial
    options:
      timeout: 10m
    parameters:
      agent: "[[attributes.Agent]]"
      device: "[[attributes.Device]]"
      command: serial
      args: ["expect", "Phosphor OpenBMC"]
