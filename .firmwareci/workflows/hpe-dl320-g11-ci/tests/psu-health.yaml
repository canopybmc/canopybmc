name: PSU Health
description: >-
  Verify PSU sensors report real values and are within thresholds. Catches
  regressions in the gxp-psu kernel driver or entity-manager PSU config.

defaults:
  transport: &local
    proto: local

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for services to settle
        transport: *local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: PSU1 Power Readings
    steps:
      - cmd: cmd
        name: PINPUT_PSU1 > 0 W
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU1 | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"PINPUT_PSU1=$READING W\"; echo \"$READING\" | awk '{if ($1+0 > 0) exit 0; else exit 1}'"
      - cmd: cmd
        name: POUTPUT_PSU1 > 0 W
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_POUTPUT_PSU1 | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"POUTPUT_PSU1=$READING W\"; echo \"$READING\" | awk '{if ($1+0 > 0) exit 0; else exit 1}'"

  - name: PSU1 Voltage Readings
    steps:
      - cmd: cmd
        name: VINPUT_PSU1 in 100-250V
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/voltage_VINPUT_PSU1 | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"VINPUT_PSU1=$READING V\"; echo \"$READING\" | awk '{v=$1+0; if (v>=100 && v<=250) exit 0; else exit 1}'"
      - cmd: cmd
        name: VOUTPUT_PSU1 in 11-14V
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/voltage_VOUTPUT_PSU1 | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"VOUTPUT_PSU1=$READING V\"; echo \"$READING\" | awk '{v=$1+0; if (v>=11 && v<=14) exit 0; else exit 1}'"

  - name: PSU2 Sensor Presence
    steps:
      - cmd: cmd
        name: PSU2 sensors readable (may be standby)
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "for S in power_PINPUT_PSU2 power_POUTPUT_PSU2 voltage_VINPUT_PSU2 voltage_VOUTPUT_PSU2; do READING=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/$S | grep -o '\"Reading\": *[0-9.-]*' | head -1 | grep -o '[0-9.-]*$'); echo \"$S=$READING\"; test -n \"$READING\" || { echo \"FAIL: $S not found\"; exit 1; }; done"

  - name: PSU Sensor Status
    steps:
      - cmd: cmd
        name: PINPUT_PSU1 status healthy
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU1 | grep -q '\"Health\": *\"OK\"'"
      - cmd: cmd
        name: PINPUT_PSU2 status healthy
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis/Sensors/power_PINPUT_PSU2 | grep -q '\"Health\": *\"OK\"'"
