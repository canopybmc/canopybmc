name: Chassis Identity
description: >-
  Verify entity-manager correctly probes the baseboard and populates chassis
  identity via Redfish. Covers baseboard JSON config, entity-manager VPD
  patches, and devicetree-vpd-parser service.

defaults:
  transport: &local
    proto: local

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for services to settle
        transport: *local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: Chassis Model
    steps:
      - cmd: cmd
        name: Model is HPE ProLiant DL320 Gen11
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"Model\".*\"HPE ProLiant DL320 Gen11\"'"

  - name: Chassis Manufacturer
    steps:
      - cmd: cmd
        name: Manufacturer is Hewlett Packard Enterprise
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"Manufacturer\".*\"Hewlett Packard Enterprise\"'"

  - name: Chassis SerialNumber
    steps:
      - cmd: cmd
        name: SerialNumber is populated
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"SerialNumber\": *\"[^\"][^\"]*\"'"

  - name: Chassis PartNumber
    steps:
      - cmd: cmd
        name: PartNumber is populated
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"PartNumber\": *\"[^\"][^\"]*\"'"

  - name: Chassis AssetTag
    steps:
      - cmd: cmd
        name: AssetTag is HPE-OBMC-001
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"AssetTag\".*\"HPE-OBMC-001\"'"

  - name: Chassis Type
    steps:
      - cmd: cmd
        name: ChassisType is RackMount
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Chassis/chassis | grep -q '\"ChassisType\".*\"RackMount\"'"
