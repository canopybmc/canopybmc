name: "Power: Host Control"
description: >-
  Verify the full host power control chain end-to-end: kernel power-ctrl
  driver, x86-power-control, D-Bus state, Redfish actions, and host serial
  console output. Captures the host console stream via SSH port 2200 on the
  test runner and verifies the host actually produces POST output during boot.
  Run this test LAST as it power-cycles the host.

defaults:
  transport: &bmc_ssh
    proto: ssh
    options:
      host: "[[attributes.BMC]]"
      user: "root"
      password: "[[attributes.BMCPassword]]"

stages:
  - name: Wait for BMC
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for BMC services
        transport: &local
          proto: local
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]

  - name: Power On Host
    steps:
      - cmd: cmd
        name: Start host console capture via port 2200
        transport: *local
        options:
          timeout: 10s
        parameters:
          executable: sh
          args:
            - "-c"
            - "sshpass -p '[[attributes.BMCPassword]]' ssh -p 2200 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@[[attributes.BMC]] > /tmp/host-console.log 2>/dev/null &"
      - cmd: cmd
        name: Send Power On via Redfish
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"ResetType\":\"On\"}' https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset -o /dev/null -w '%{http_code}'); echo \"Power On HTTP=$HTTP\"; test \"$HTTP\" = \"200\" || test \"$HTTP\" = \"204\""
      - cmd: cmd
        name: Wait 120s for host to boot
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["120"]

  - name: Verify Host Is On
    steps:
      - cmd: cmd
        name: Host console captured bytes from boot
        transport: *local
        options:
          timeout: 10s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "SIZE=$(wc -c < /tmp/host-console.log 2>/dev/null || echo 0); echo \"captured_bytes=$SIZE\"; test \"$SIZE\" -gt 100"
      - cmd: cmd
        name: Console contains Initialization output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "Initialization", /tmp/host-console.log]
      - cmd: cmd
        name: Console contains BIOS output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "BIOS", /tmp/host-console.log]
      - cmd: cmd
        name: Console contains Memory output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "Memory", /tmp/host-console.log]
      - cmd: cmd
        name: Console contains CHIF output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "CHIF", /tmp/host-console.log]
      - cmd: cmd
        name: PowerState is On via Redfish
        transport: *local
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"On"'
      - cmd: cmd
        name: Host state Running via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Running"
      - cmd: cmd
        name: Chassis state On via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Chassis, /xyz/openbmc_project/state/chassis0, xyz.openbmc_project.State.Chassis, CurrentPowerState]
          expect:
            - regex: "On"
      - cmd: cmd
        name: Power control service active
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: systemctl
          args: ["is-active", "xyz.openbmc_project.Chassis.Control.Power@0.service"]

  - name: Power Off Host via Redfish
    steps:
      - cmd: cmd
        name: Send ForceOff
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"ResetType\":\"ForceOff\"}' https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset -o /dev/null -w '%{http_code}'); echo \"ForceOff HTTP=$HTTP\"; test \"$HTTP\" = \"200\" || test \"$HTTP\" = \"204\""
      - cmd: cmd
        name: Wait for power off
        transport: *local
        parameters:
          executable: sleep
          args: ["15"]
      - cmd: cmd
        name: PowerState is Off via Redfish
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"Off"'
      - cmd: cmd
        name: Host state Off via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Off"

  - name: Power On Host via Redfish
    steps:
      - cmd: cmd
        name: Start second console capture via port 2200
        transport: *local
        options:
          timeout: 10s
        parameters:
          executable: sh
          args:
            - "-c"
            - "sshpass -p '[[attributes.BMCPassword]]' ssh -p 2200 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null root@[[attributes.BMC]] > /tmp/host-console-2.log 2>/dev/null &"
      - cmd: cmd
        name: Send Power On
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "HTTP=$(curl -sk -u root:[[attributes.BMCPassword]] -X POST -H 'Content-Type: application/json' -d '{\"ResetType\":\"On\"}' https://[[attributes.BMC]]/redfish/v1/Systems/system/Actions/ComputerSystem.Reset -o /dev/null -w '%{http_code}'); echo \"On HTTP=$HTTP\"; test \"$HTTP\" = \"200\" || test \"$HTTP\" = \"204\""
      - cmd: cmd
        name: Wait 120s for host to boot
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["120"]

  - name: Verify Second Boot
    steps:
      - cmd: cmd
        name: PowerState is On via Redfish
        transport: *local
        parameters:
          executable: curl
          args: [-sk, -u, "root:[[attributes.BMCPassword]]", "https://[[attributes.BMC]]/redfish/v1/Systems/system"]
          expect:
            - regex: '"PowerState": *"On"'
      - cmd: cmd
        name: Second boot console captured bytes
        transport: *local
        options:
          timeout: 10s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "SIZE=$(wc -c < /tmp/host-console-2.log 2>/dev/null || echo 0); echo \"captured_bytes=$SIZE\"; test \"$SIZE\" -gt 100"
      - cmd: cmd
        name: Console contains Initialization output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "Initialization", /tmp/host-console-2.log]
      - cmd: cmd
        name: Console contains BIOS output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "BIOS", /tmp/host-console-2.log]
      - cmd: cmd
        name: Console contains Memory output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "Memory", /tmp/host-console-2.log]
      - cmd: cmd
        name: Console contains CHIF output
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: grep
          args: [-qi, "CHIF", /tmp/host-console-2.log]
      - cmd: cmd
        name: Host state Running via D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: busctl
          args: [get-property, xyz.openbmc_project.State.Host, /xyz/openbmc_project/state/host0, xyz.openbmc_project.State.Host, CurrentHostState]
          expect:
            - regex: "Running"

  - name: Cleanup
    steps:
      - cmd: cmd
        name: Kill console capture processes
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "pkill -f 'ssh -p 2200.*[[attributes.BMC]]' 2>/dev/null || true"
      - cmd: cmd
        name: Remove capture files
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: rm
          args: [-f, /tmp/host-console.log, /tmp/host-console-2.log]
