name: Redfish UpdateService Validation
description: >-
  Validate /redfish/v1/UpdateService tree including FirmwareInventory
  against DMTF schemas.
on-error: continue

defaults:
  transport: &local
    proto: local

stages:
  - name: Validate UpdateService
    steps:
      - cmd: cmd
        name: Check storage provisioning
        transport: *local
        parameters:
          executable: ls
          args:
            - "-la"
            - "[[storage.RedfishValidator]]"
      - cmd: cmd
        name: Validate UpdateService tree
        transport: *local
        options:
          timeout: 10m
          on-error: continue
        parameters:
          executable: rf_service_validator
          args:
            - "--user"
            - "root"
            - "--password"
            - "[[attributes.BMCPassword]]"
            - "--rhost"
            - "https://[[attributes.BMC]]"
            - "--payload"
            - "tree"
            - "/redfish/v1/UpdateService"
            - "--nooemcheck"
            - "--logdir"
            - "/tmp/redfish-results-update"
      - cmd: cmd
        name: Show validation report
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "cat /tmp/redfish-results-update/RedfishServiceValidatorReport_*.html"
