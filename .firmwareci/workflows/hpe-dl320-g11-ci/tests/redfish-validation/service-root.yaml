name: Redfish Service Root Validation
description: >-
  Validate the Redfish service root and top-level resource links
  against DMTF schemas using the Redfish Service Validator.
on-error: continue

defaults:
  transport: &local
    proto: local

stages:
  - name: Validate Service Root
    steps:
      - cmd: cmd
        name: Check storage provisioning
        transport: *local
        parameters:
          executable: ls
          args:
            - "-la"
            - "[[storage.RedfishValidator]]"
      - cmd: cmd
        name: Validate service root
        transport: *local
        options:
          timeout: 5m
          on-error: continue
        parameters:
          executable: rf_service_validator
          args:
            - "--user"
            - "root"
            - "--password"
            - "[[attributes.BMCPassword]]"
            - "--rhost"
            - "https://[[attributes.BMC]]"
            - "--payload"
            - "single"
            - "/redfish/v1/"
            - "--nooemcheck"
            - "--logdir"
            - "/tmp/redfish-results-root"
      - cmd: cmd
        name: Show validation report
        transport: *local
        parameters:
          executable: sh
          args:
            - "-c"
            - "cat /tmp/redfish-results-root/RedfishServiceValidatorReport_*.html"
