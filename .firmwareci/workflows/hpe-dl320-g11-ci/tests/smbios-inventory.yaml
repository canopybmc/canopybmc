name: SMBIOS Inventory
description: >-
  Verify the CHIF to SMBIOS to Redfish pipeline produces expected inventory.
  Covers kernel CHIF driver, gxp-chif-service, smbios-mdr, cpuinfo, and
  the full SMBIOS data path to Redfish. Requires host POST complete.

defaults:
  transport: &local
    proto: local

stages:
  - name: Wait for BMC and Host POST
    steps:
      - cmd: ping
        name: Wait for SSH
        options:
          timeout: 5m
        parameters:
          host: "[[attributes.BMC]]"
      - cmd: cmd
        name: Wait for BMC services
        transport: &bmc_ssh
          proto: ssh
          options:
            host: "[[attributes.BMC]]"
            user: "root"
            password: "[[attributes.BMCPassword]]"
        options:
          timeout: 2m
        parameters:
          executable: sleep
          args: ["45"]
      - cmd: cmd
        name: Wait for host POST and SMBIOS transfer
        transport: *local
        options:
          timeout: 3m
        parameters:
          executable: sleep
          args: ["90"]

  - name: DIMM Inventory via Redfish
    steps:
      - cmd: cmd
        name: Memory collection has >= 16 members
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "COUNT=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system/Memory | grep -o '\"Members@odata.count\": *[0-9]*' | grep -o '[0-9]*$'); echo \"DIMM slots: $COUNT\"; test \"$COUNT\" -ge 16"
      - cmd: cmd
        name: At least 1 DIMM enabled
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "ENABLED=0; for i in 0 1 2 3 4 5 6 7; do curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system/Memory/dimm$i 2>/dev/null | grep -q '\"State\": *\"Enabled\"' && ENABLED=$((ENABLED+1)); done; echo \"Enabled DIMMs (sample): $ENABLED\"; test \"$ENABLED\" -ge 1"
      - cmd: cmd
        name: Enabled DIMM has DDR5 and non-zero capacity
        transport: *local
        options:
          timeout: 30s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "for i in 0 1 2 3 4 5 6 7; do DATA=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system/Memory/dimm$i 2>/dev/null); echo \"$DATA\" | grep -q '\"State\": *\"Enabled\"' || continue; echo \"$DATA\" | grep -q '\"MemoryDeviceType\": *\"DDR5\"' || { echo \"dimm$i not DDR5\"; exit 1; }; CAP=$(echo \"$DATA\" | grep -o '\"CapacityMiB\": *[0-9]*' | grep -o '[0-9]*$'); echo \"dimm$i: DDR5, CapacityMiB=$CAP\"; test \"$CAP\" -gt 0 && exit 0; done; echo 'No enabled DDR5 DIMM found'; exit 1"

  - name: CPU Inventory via Redfish
    steps:
      - cmd: cmd
        name: Processors collection has >= 1 member
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "COUNT=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors | grep -o '\"Members@odata.count\": *[0-9]*' | grep -o '[0-9]*$'); echo \"Processors: $COUNT\"; test \"$COUNT\" -ge 1"
      - cmd: cmd
        name: cpu0 is Intel with >= 4 cores
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "DATA=$(curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system/Processors/cpu0); echo \"$DATA\" | grep -q 'Intel' || { echo 'cpu0 not Intel'; exit 1; }; CORES=$(echo \"$DATA\" | grep -o '\"TotalCores\": *[0-9]*' | grep -o '[0-9]*$'); echo \"cpu0 TotalCores=$CORES\"; test \"$CORES\" -ge 4"

  - name: D-Bus Inventory
    steps:
      - cmd: cmd
        name: TPM on D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "busctl tree xyz.openbmc_project.Smbios.MDR_V2 --no-pager | grep -q tpm0"
      - cmd: cmd
        name: PCIe slot objects on D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "COUNT=$(busctl tree xyz.openbmc_project.Smbios.MDR_V2 --no-pager | grep -c pcieslot); echo \"PCIe slots: $COUNT\"; test \"$COUNT\" -ge 4"
      - cmd: cmd
        name: BIOS object on D-Bus
        transport: *bmc_ssh
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "busctl tree xyz.openbmc_project.Smbios.MDR_V2 --no-pager | grep -q bios"

  - name: System Identity via Redfish
    steps:
      - cmd: cmd
        name: System Model is HPE ProLiant DL320 Gen11
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system | grep -q '\"Model\".*\"HPE ProLiant DL320 Gen11\"'"
      - cmd: cmd
        name: System Manufacturer is HPE
        transport: *local
        options:
          timeout: 5s
          on-error: continue
        parameters:
          executable: sh
          args:
            - "-c"
            - "curl -sk -u root:[[attributes.BMCPassword]] https://[[attributes.BMC]]/redfish/v1/Systems/system | grep -q '\"Manufacturer\".*\"Hewlett Packard Enterprise\"'"
