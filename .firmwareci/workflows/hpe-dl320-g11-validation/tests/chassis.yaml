name: "Validator: Redfish Chassis"
description: >-
  Validate /redfish/v1/Chassis tree including Thermal, Power,
  Sensors, and PCIeSlots against DMTF schemas.
on-error: continue

defaults:
  transport: &local
    proto: local

stages:
  - name: Validate Chassis
    steps:
      - cmd: cmd
        name: Check storage provisioning
        transport: *local
        parameters:
          executable: ls
          args:
            - "-la"
            - "[[storage.RedfishValidator]]"
      - cmd: cmd
        name: Validate Chassis tree
        transport: *local
        options:
          timeout: 15m
          on-error: continue
        parameters:
          executable: rf_service_validator
          args:
            - "--user"
            - "root"
            - "--password"
            - "[[attributes.BMCPassword]]"
            - "--rhost"
            - "https://[[attributes.BMC]]"
            - "--payload"
            - "tree"
            - "/redfish/v1/Chassis"
            - "--nooemcheck"
            - "--collectionlimit"
            - "50"
            - "--logdir"
            - "/tmp/redfish-results-chassis"
      - cmd: cmd
        name: Show validation report
        transport: *local
        parameters:
          executable: cat
          args: ["/tmp/redfish-results-chassis/RedfishServiceValidatorReport_latest.html"]
