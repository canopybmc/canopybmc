name: "Validator: Redfish Systems"
description: >-
  Validate /redfish/v1/Systems tree including Processors, Memory,
  Storage, PCIeDevices, and LogServices against DMTF schemas.
on-error: continue

defaults:
  transport: &local
    proto: local

stages:
  - name: Validate Systems
    steps:
      - cmd: cmd
        name: Check storage provisioning
        transport: *local
        parameters:
          executable: ls
          args:
            - "-la"
            - "[[storage.RedfishValidator]]"
      - cmd: cmd
        name: Validate Systems tree
        transport: *local
        options:
          timeout: 15m
          on-error: continue
        parameters:
          executable: rf_service_validator
          args:
            - "--user"
            - "root"
            - "--password"
            - "[[attributes.BMCPassword]]"
            - "--rhost"
            - "https://[[attributes.BMC]]"
            - "--payload"
            - "tree"
            - "/redfish/v1/Systems"
            - "--nooemcheck"
            - "--collectionlimit"
            - "50"
            - "--logdir"
            - "/tmp/redfish-results-systems"
      - cmd: cmd
        name: Show validation report
        transport: *local
        parameters:
          executable: cat
          args: ["/tmp/redfish-results-systems/RedfishServiceValidatorReport_latest.html"]
