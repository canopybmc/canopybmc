name: "Validator: Redfish AccountService"
description: >-
  Validate /redfish/v1/AccountService tree including Accounts,
  Roles, and LDAP certificate resources against DMTF schemas.
on-error: continue

defaults:
  transport: &local
    proto: local

stages:
  - name: Validate AccountService
    steps:
      - cmd: cmd
        name: Check storage provisioning
        transport: *local
        parameters:
          executable: ls
          args:
            - "-la"
            - "[[storage.RedfishValidator]]"
      - cmd: cmd
        name: Validate AccountService tree
        transport: *local
        options:
          timeout: 10m
          on-error: continue
        parameters:
          executable: rf_service_validator
          args:
            - "--user"
            - "root"
            - "--password"
            - "[[attributes.BMCPassword]]"
            - "--rhost"
            - "https://[[attributes.BMC]]"
            - "--payload"
            - "tree"
            - "/redfish/v1/AccountService"
            - "--nooemcheck"
            - "--logdir"
            - "/tmp/redfish-results-accounts"
      - cmd: cmd
        name: Show validation report
        transport: *local
        parameters:
          executable: cat
          args: ["/tmp/redfish-results-accounts/RedfishServiceValidatorReport_latest.html"]
