name: Update OpenBMC reference
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  update-openbmc:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git branch -D rebase/openbmc 2>/dev/null || true

      - name: Run obmc-bump
        run: task -y obmc-bump

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE=$(mktemp)
          cat > "$BODY_FILE" <<'BODYEOF'
          Automated changes by the update-openbmc GitHub Action.

          ```
          BODYEOF

          git log -1 --pretty=%B origin/rebase/openbmc >> "$BODY_FILE"
          echo '```' >> "$BODY_FILE"

          gh pr create \
            --head rebase/openbmc \
            --title "openbmc: update ref" \
            --body-file "$BODY_FILE" \
          || gh pr edit rebase/openbmc \
            --title "openbmc: update ref" \
            --body-file "$BODY_FILE"
